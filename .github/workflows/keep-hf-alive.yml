name: Keep HF Space Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HF_SPACE_URL: https://rampluto-medusa-env.hf.space
    steps:
      - name: Ping Hugging Face Space
        run: curl -fsS --retry 3 --retry-delay 5 --max-time 30 "$HF_SPACE_URL" > /dev/null
